<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ScriptGen AI - Short-form Video Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["'Noto Sans KR'", "Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans KR', 'Manrope', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #473b54;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-300">
<div class="flex h-screen overflow-hidden">
<!-- Sidebar Navigation -->
<aside class="w-64 border-r border-primary/10 bg-background-light dark:bg-background-dark flex flex-col">
<div class="p-6">
<div class="flex items-center gap-2 mb-8">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">movie_edit</span>
</div>
<div>
<h1 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-none">스크립트젠 AI</h1>
<p class="text-primary text-xs font-medium">숏폼 전문 생성기</p>
</div>
</div>
<nav class="space-y-1">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary" href="#">
<span class="material-symbols-outlined fill-1">home</span>
<span class="text-sm font-semibold">홈</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-sm font-medium">히스토리</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">description</span>
<span class="text-sm font-medium">템플릿</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-primary/5 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-sm font-medium">설정</span>
</a>
</nav>
</div>
<div class="mt-auto p-6">
<div class="rounded-xl bg-gradient-to-br from-primary to-[#b166ff] p-4 text-white">
<p class="text-xs font-bold uppercase tracking-wider mb-1">프로 플랜</p>
<p class="text-sm mb-3">무제한 대본 및 AI 보이스 기능을 이용해 보세요.</p>
<button class="w-full py-2 bg-white/20 hover:bg-white/30 rounded-lg text-xs font-bold backdrop-blur-sm transition-all">지금 업그레이드하기</button>
</div>
</div>
</aside>
<!-- Main Workspace -->
<main class="flex-1 flex overflow-hidden">
<!-- Input Section -->
<section class="flex-1 p-8 overflow-y-auto custom-scrollbar">
<div class="max-w-2xl mx-auto space-y-8">
<header>
<h2 class="text-3xl font-black tracking-tight text-slate-900 dark:text-slate-100 mb-2">새 대본 만들기</h2>
<p class="text-slate-500 dark:text-slate-400">아이디어를 조회수 높은 숏폼 대본으로 바꿔보세요.</p>
</header>
<div class="space-y-6">
<!-- Topic Input -->
<div class="space-y-2">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300">주제 또는 키워드</label>
<textarea class="w-full h-40 p-4 rounded-xl border-2 border-primary/10 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-all resize-none" placeholder="예: 생산성을 높이는 아침 습관 5가지, 고양이가 잠을 많이 자는 이유 등"></textarea>
</div>
<!-- Tone Selection -->
<div class="space-y-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300">톤 선택</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary/20 bg-primary text-white text-sm font-semibold">재미있는</button>
<button class="px-4 py-2 rounded-full border border-primary/20 bg-white dark:bg-background-dark/40 text-slate-600 dark:text-slate-400 hover:border-primary text-sm font-medium transition-all">정보성</button>
<button class="px-4 py-2 rounded-full border border-primary/20 bg-white dark:bg-background-dark/40 text-slate-600 dark:text-slate-400 hover:border-primary text-sm font-medium transition-all">감성적인</button>
<button class="px-4 py-2 rounded-full border border-primary/20 bg-white dark:bg-background-dark/40 text-slate-600 dark:text-slate-400 hover:border-primary text-sm font-medium transition-all">전문적인</button>
</div>
</div>
<!-- Platform Toggle -->
<div class="space-y-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300">최적화 플랫폼</label>
<div class="inline-flex p-1 rounded-xl bg-slate-200 dark:bg-slate-800/50">
<button class="flex items-center gap-2 px-6 py-2 rounded-lg bg-white dark:bg-background-dark shadow-sm text-sm font-bold text-primary transition-all"><span class="material-symbols-outlined text-lg">play_circle</span> 쇼츠</button>
<button class="flex items-center gap-2 px-6 py-2 rounded-lg text-slate-500 hover:text-primary transition-all text-sm font-medium"><span class="material-symbols-outlined text-lg">rebase_edit</span> 릴스</button>
<button class="flex items-center gap-2 px-6 py-2 rounded-lg text-slate-500 hover:text-primary transition-all text-sm font-medium"><span class="material-symbols-outlined text-lg">music_video</span> 틱톡</button>
</div>
</div>
<!-- Generate Button -->
<div class="pt-4">
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/25 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]"><span class="material-symbols-outlined">auto_awesome</span> 대본 생성하기</button>
</div>
</div>
</div>
</section>
<!-- Result Section -->
<section class="w-[450px] border-l border-primary/10 bg-slate-50 dark:bg-background-dark/30 p-8 flex flex-col">
<div class="flex items-center justify-between mb-6">
<h3 class="text-lg font-bold">생성 결과</h3>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-primary/10 text-primary text-xs font-bold hover:bg-primary/20 transition-all"><span class="material-symbols-outlined text-sm">content_copy</span> 복사</button>
</div>
<!-- Empty State / Placeholder -->
<div class="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-primary/20 rounded-2xl p-8 text-center bg-white/50 dark:bg-background-dark/20 overflow-y-auto custom-scrollbar">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl">edit_note</span>
</div>
<h4 class="text-slate-900 dark:text-slate-100 font-bold mb-2 text-lg">아직 생성된 대본이 없습니다</h4>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">주제와 설정을 입력하여 고효율 숏폼 대본을 만들어보세요.</p>
<!-- Preview of Script structure (Dotted lines) -->
<div class="w-full mt-10 space-y-4 opacity-30">
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-full w-3/4"></div>
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-full w-full"></div>
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-full w-5/6"></div>
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-full w-2/3"></div>
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-full w-full"></div>
</div>
</div>
<div class="mt-6 pt-6 border-t border-primary/10">
<div class="flex items-center justify-between text-xs text-slate-500 dark:text-slate-400">
<span>예상 소요 시간: 0s</span>
<span>예상 읽기 속도: 130 wpm</span>
</div>
</div>
</section>
</main>
</div>
</body></html>
