<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptGen AI - 숏폼 대본 생성기</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background-dark text-slate-300 font-sans">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-background-darker/30 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-primary/20 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary text-2xl">auto_awesome</span>
                </div>
                <h1 class="text-xl font-bold text-white">ScriptGen AI</h1>
            </div>

            <nav class="flex-1 space-y-2">
                <a href="#" class="flex items-center gap-3 px-4 py-2 rounded-lg bg-primary/10 text-primary font-bold">
                    <span class="material-symbols-outlined">home</span>
                    <span>홈</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/5 text-slate-400">
                    <span class="material-symbols-outlined">history</span>
                    <span>히스토리</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/5 text-slate-400">
                    <span class="material-symbols-outlined">apps</span>
                    <span>템플릿</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/5 text-slate-400">
                    <span class="material-symbols-outlined">settings</span>
                    <span>설정</span>
                </a>
            </nav>

            <div class="mt-auto p-4 rounded-lg bg-gradient-to-br from-primary/30 to-purple-800/20 text-center">
                <h3 class="font-bold text-white">Pro 플랜으로 업그레이드</h3>
                <p class="text-sm text-slate-300 mt-2 mb-4">더 많은 기능과 무제한 생성을 경험해보세요.</p>
                <button class="w-full py-2 bg-primary rounded-lg font-bold text-white hover:bg-primary/90 transition-all">자세히 보기</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            <!-- Input Section -->
            <section class="w-[500px] flex flex-col gap-8 sticky top-8">
                <div>
                    <label for="topicInput" class="text-lg font-bold text-slate-100 mb-3 block">1. 주제 또는 키워드</label>
                    <textarea id="topicInput" class="w-full h-32 p-4 rounded-xl bg-background-dark/40 border border-slate-700 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="예시) 30초 안에 설명하는 양자역학의 신비"></textarea>
                </div>

                <div>
                    <label class="text-lg font-bold text-slate-100 mb-3 block">2. 어떤 톤으로 작성할까요?</label>
                    <div id="toneButtons" class="flex flex-wrap gap-3">
                        <button data-value="재미있는" class="px-4 py-2 rounded-full border-2 border-primary bg-primary text-white font-semibold transition-all">재미있는</button>
                        <button data-value="정보성" class="px-4 py-2 rounded-full border-2 border-slate-700 bg-white/10 text-slate-300 hover:border-primary transition-all">정보성</button>
                        <button data-value="감성적인" class="px-4 py-2 rounded-full border-2 border-slate-700 bg-white/10 text-slate-300 hover:border-primary transition-all">감성적인</button>
                        <button data-value="전문적인" class="px-4 py-2 rounded-full border-2 border-slate-700 bg-white/10 text-slate-300 hover:border-primary transition-all">전문적인</button>
                    </div>
                </div>

                <div>
                    <label class="text-lg font-bold text-slate-100 mb-3 block">3. 어느 플랫폼에 사용될까요?</label>
                    <div id="platformButtons" class="inline-flex p-1 rounded-xl bg-background-dark/40 border border-slate-700">
                        <button data-value="쇼츠" class="px-6 py-2 rounded-lg bg-white/10 text-primary font-bold shadow-md">쇼츠</button>
                        <button data-value="릴스" class="px-6 py-2 rounded-lg text-slate-400">릴스</button>
                        <button data-value="틱톡" class="px-6 py-2 rounded-lg text-slate-400">틱톡</button>
                    </div>
                </div>

                <button id="generateBtn" class="w-full py-4 bg-primary rounded-xl font-bold text-white text-lg hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">auto_awesome</span>
                    <span>대본 생성하기</span>
                </button>
            </section>

            <!-- Result Section -->
            <section id="resultPanel" class="w-[550px] flex flex-col gap-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-white">생성 결과</h2>
                    <button id="copyBtn" class="flex items-center gap-1.5 text-slate-400 hover:text-white transition-all">
                        <span class="material-symbols-outlined text-lg">content_copy</span>
                        <span class="text-sm font-medium">전체 복사</span>
                    </button>
                </div>
                <div id="resultContent" class="h-[calc(100vh-120px)] bg-background-dark/30 rounded-2xl border border-slate-800/50 p-6 flex flex-col custom-scrollbar overflow-y-auto">
                     <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-center">
                        <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
                            <span class="material-symbols-outlined text-primary text-5xl">edit_note</span>
                        </div>
                        <h3 id="loadingText" class="text-slate-100 font-bold text-xl mb-2">아이디어를 현실로</h3>
                        <p class="text-slate-500 leading-relaxed">
                            좌측 입력창에 만들고 싶은 영상의 주제를 입력하고<br>버튼을 눌러 AI 대본을 생성해보세요.
                        </p>
                    </div>
                </div>
                 <div class="mt-4 text-xs text-slate-500 flex justify-between">
                    <span id="timeEstimate">예상 소요 시간: -</span>
                    <span id="readingSpeed">예상 읽기 속도: -</span>
                </div>
            </section>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
