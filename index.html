<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptGen AI</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background-darker text-white font-sans flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-background-dark/50 p-6 flex flex-col shrink-0">
        <h1 class="text-xl font-black text-primary mb-10">ScriptGen AI</h1>
        <nav id="navMenu" class="flex flex-col gap-2">
            <a href="#" data-view="home" class="nav-item flex items-center gap-3 p-3 rounded-lg text-slate-300 hover:bg-white/10">
                <span class="material-symbols-outlined">home</span><span class="font-bold">홈</span>
            </a>
            <a href="#" data-view="history" class="nav-item flex items-center gap-3 p-3 rounded-lg text-slate-300 hover:bg-white/10">
                <span class="material-symbols-outlined">history</span><span class="font-bold">히스토리</span>
            </a>
            <a href="#" data-view="templates" class="nav-item flex items-center gap-3 p-3 rounded-lg text-slate-300 hover:bg-white/10">
                <span class="material-symbols-outlined">add_box</span><span class="font-bold">템플릿</span>
            </a>
            <a href="#" data-view="settings" class="nav-item flex items-center gap-3 p-3 rounded-lg text-slate-300 hover:bg-white/10">
                <span class="material-symbols-outlined">settings</span><span class="font-bold">설정</span>
            </a>
        </nav>
        <div class="mt-auto bg-primary/10 p-4 rounded-lg">
            <div class="flex justify-between items-center">
                <p class="text-sm text-slate-300 capitalize" id="plan-display">free plan</p>
                <button id="upgradeBtn" class="bg-primary/80 hover:bg-primary text-white text-xs font-bold py-1 px-3 rounded-md transition-all">업그레이드</button>
            </div>
            <div class="text-xs text-slate-400 mt-3 flex flex-col gap-1 border-t border-slate-700/50 pt-3">
                <p>오늘 생성: <span id="daily-generations-count">0/3</span></p>
                <p>템플릿 저장: <span id="template-count">0/2</span></p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 flex flex-col">
        <!-- Home View -->
        <section id="view-home" class="hidden flex-col flex-1 gap-6">
            <div class="flex-1 flex flex-col gap-6">
                <div class="flex flex-col gap-3">
                    <label for="topicInput" class="text-sm font-bold text-slate-300">주제 또는 키워드</label>
                    <input id="topicInput" type="text" placeholder="예: Z세대에게 인기 있는 새로운 패션 아이템" class="bg-background-dark/40 border border-slate-700/50 rounded-lg p-4 focus:ring-2 focus:ring-primary focus:outline-none">
                </div>
                <div class="flex flex-col gap-3">
                    <p class="text-sm font-bold text-slate-300">톤앤매너</p>
                    <div id="toneButtons" class="flex gap-2"></div>
                </div>
                <div class="flex flex-col gap-3">
                    <p class="text-sm font-bold text-slate-300">플랫폼</p>
                    <div id="platformButtons" class="flex gap-2"></div>
                </div>
                <div class="flex gap-4 mt-4">
                    <button id="generateBtn" class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-lg transition-all">대본 생성하기</button>
                    <button id="saveTemplateBtn" class="bg-background-dark/30 hover:bg-background-dark/60 text-slate-300 font-bold py-4 px-6 rounded-lg transition-all">템플릿으로 저장</button>
                </div>
            </div>
            <div id="resultContent" class="flex-1 bg-background-dark/30 rounded-xl border border-slate-800/50 flex items-center justify-center">
                 <div class="text-center text-slate-500">
                    <span class="material-symbols-outlined text-6xl">auto_awesome</span>
                    <p class="mt-2">AI가 생성한 대본이 여기에 표시됩니다.</p>
                </div>
            </div>
        </section>

        <!-- History View -->
        <section id="view-history" class="hidden flex-1 flex flex-col">
            <h2 class="text-2xl font-bold text-slate-100 mb-6">히스토리</h2>
            <div id="history-list-container" class="flex-1 flex flex-col gap-4 overflow-y-auto"></div>
        </section>

        <!-- Templates View -->
        <section id="view-templates" class="hidden flex-1 flex flex-col">
            <h2 class="text-2xl font-bold text-slate-100 mb-6">나의 템플릿</h2>
            <div id="template-list-container" class="flex-1 flex flex-col gap-4 overflow-y-auto"></div>
        </section>

        <!-- Settings View -->
        <section id="view-settings" class="hidden flex-1 flex flex-col">
            <h2 class="text-2xl font-bold text-slate-100 mb-6">설정</h2>
            <div class="max-w-md flex flex-col gap-6">
                <form id="settingsForm" class="flex flex-col gap-6">
                    <div>
                        <label for="defaultToneSelect" class="text-sm font-bold text-slate-300 mb-2 block">기본 톤앤매너</label>
                        <select id="defaultToneSelect" class="w-full bg-background-dark/40 border border-slate-700/50 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none"></select>
                    </div>
                    <div>
                        <label for="defaultPlatformSelect" class="text-sm font-bold text-slate-300 mb-2 block">기본 플랫폼</label>
                        <select id="defaultPlatformSelect" class="w-full bg-background-dark/40 border border-slate-700/50 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none"></select>
                    </div>
                    <div>
                        <label for="readingSpeedInput" class="text-sm font-bold text-slate-300 mb-2 block">읽기 속도 (wpm)</label>
                        <input type="number" id="readingSpeedInput" value="130" min="50" max="300" class="w-full bg-background-dark/40 border border-slate-700/50 rounded-lg p-3 focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                </form>
                <div class="mt-4 flex items-center gap-4">
                     <button id="saveSettingsBtn" class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-lg transition-all">설정 저장</button>
                     <p id="settingsSaveMsg" class="text-green-400 text-sm"></p>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
